worker_processes auto;
pid /var/run/nginx.pid;
error_log /dev/stdout warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide the nginx version (and the exact patch version) from the Server header.
    server_tokens off;

    # Structured JSON access log (parseable level/message fields for log aggregation). The previous
    # CLF format showed up as unparsed raw text with no level in log tooling. escape=json safely
    # escapes user-controlled values (request line, user-agent). level is derived from the status
    # code (4xx→warning, 5xx→error) so failed requests surface as such; msg = the request line.
    map $status $access_level {
        "~^5"   error;
        "~^4"   warning;
        default info;
    }
    # Drop the load-balancer health-check poll (ELB-HealthChecker hits /wallets-v2.json every few
    # seconds → constant 200 noise). Same intent as `access_log off` on /healthz below; that one only
    # catches the dedicated probe path, this one catches the health check that rides the content path.
    map $http_user_agent $access_loggable {
        "~ELB-HealthChecker"  0;
        default               1;
    }
    log_format json_access escape=json
        '{'
        '"level":"$access_level",'
        '"msg":"$request",'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /dev/stdout json_access if=$access_loggable;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        # Probe endpoints for the liveness and readiness checks. Static 200: nginx serves pre-baked
        # files, so "process up" is the whole story. A draining instance leaves rotation via the
        # preStop hook (graceful `nginx -s quit` after a short sleep so the load balancer can
        # deregister it) plus the pod termination grace period, not by flipping /readyz to 503, which
        # would need a sidecar and buys nothing for a static file server. access_log off so the
        # frequent health-check poll does not flood stdout.
        location = /healthz {
            access_log off;
            add_header Content-Type "text/plain; charset=utf-8" always;
            return 200 "ok\n";
        }
        location = /readyz {
            access_log off;
            add_header Content-Type "text/plain; charset=utf-8" always;
            return 200 "ok\n";
        }

        # CORS headers — dApps fetch wallets-v2.json cross-origin, so these must stay
        # on the response. add_header in a location resets inherited ones, so the CORS
        # set is repeated in each location alongside its Cache-Control.
        location /assets/ {
            # CORS preflight: answer OPTIONS with 204 (bare nginx returns 405).
            # add_header inside an `if` does NOT inherit the location-level set, so the
            # CORS headers are repeated inside the block.
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "PUT, GET, POST, OPTIONS, DELETE" always;
                add_header Access-Control-Allow-Headers "Content-Type,Cache-Control" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "1728000" always;
                add_header Content-Type "text/plain; charset=utf-8" always;
                add_header Content-Length 0 always;
                return 204;
            }
            try_files $uri =404;
            add_header Cache-Control "public, max-age=21600" always; # 6 hours
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "PUT, GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Content-Type,Cache-Control" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "1728000" always;
        }

        location / {
            # CORS preflight: answer OPTIONS with 204 (bare nginx returns 405).
            # add_header inside an `if` does NOT inherit the location-level set, so the
            # CORS headers are repeated inside the block.
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "PUT, GET, POST, OPTIONS, DELETE" always;
                add_header Access-Control-Allow-Headers "Content-Type,Cache-Control" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "1728000" always;
                add_header Content-Type "text/plain; charset=utf-8" always;
                add_header Content-Length 0 always;
                return 204;
            }
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, max-age=10800, stale-while-revalidate=86400" always; # 3h fresh, serve-stale up to 24h while revalidating
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "PUT, GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Content-Type,Cache-Control" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "1728000" always;
        }

        location = / {
            autoindex on;
        }
    }
}